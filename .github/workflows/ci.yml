name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.17.0

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
