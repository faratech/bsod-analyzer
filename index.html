    /* Dark theme (default) */
    :root,
    .dark {
      --brand-primary: #3b82f6;
      --brand-secondary: #1e40af;
      --brand-accent: #60a5fa;
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --bg-hover: #222222;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666666;
      --border-primary: #2a2a2a;
      --border-secondary: #333333;
      --status-success: #10b981;
      --status-warning: #f59e0b;
      --status-error: #ef4444;
      --status-info: #3b82f6;
    }

    /* Light theme */
    .light {
      --brand-primary: #2563eb;
      --brand-secondary: #1d4ed8;
      --brand-accent: #3b82f6;
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #f1f3f5;
      --bg-hover: #e9ecef;
      --text-primary: #1a1a1a;
      --text-secondary: #495057;
      --text-tertiary: #868e96;
      --border-primary: #dee2e6;
      --border-secondary: #ced4da;
      --status-success: #059669;
      --status-warning: #d97706;
      --status-error: #dc2626;
      --status-info: #2563eb;
    }
    
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
      /* Font synthesis to prevent layout shift */
      font-synthesis: none;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    /* Header styles */
    .header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background-color: rgba(17, 17, 17, 0.9);
    }
    
    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    
    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    
    .logo-subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 400;
    }
    
    /* Hero section critical styles */
    .hero {
      position: relative;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 4rem 0;
    }
    
    .hero-background {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .hero-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    
    .hero-subtitle {
      font-size: 1.125rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    
    /* Button styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      text-decoration: none;
      white-space: nowrap;
      user-select: none;
    }
    
    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
    }
    
    .footer {
      background-color: var(--bg-secondary);
      border-top: 1px solid var(--border-primary);
      margin-top: 6rem;
      display: flex;
      flex-direction: column;
    }
    
    /* Loading state */
    #root {
      min-height: 100vh;
    }
    
    /* Prevent FOUC */
    .app {
      opacity: 1;
      transition: opacity 0.3s ease;
    }
